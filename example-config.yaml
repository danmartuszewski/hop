version: 1

# Optional theme overrides. `theme:` is the shared base palette applied
# to both dark and light terminals. `theme_dark:` and `theme_light:`
# layer on top of it for their respective backgrounds and only need to
# list the colors that differ. Any color not set at any layer keeps the
# built-in default.
#
# Color values accept either an ANSI 256 code as a quoted number (e.g. "39")
# or a hex string (e.g. "#bd93f9"). ANSI codes adapt to your terminal's
# palette; hex values are absolute.
#
# All available keys (default values shown):
# theme:
#   primary: "39"      # headers, titles, selected items, help keys
#   secondary: "245"   # borders, version, host, footer text
#   accent: "212"      # project labels, tag highlights
#   success: "82"      # user, healthy hosts
#   warning: "214"     # environment labels
#   error: "196"       # unreachable hosts
#   muted: "240"       # port numbers, low-emphasis text
#   selection: "236"   # tag pill background
#   foreground: "255"  # filter input text
#
# Override only what you need; for example:
# theme_dark:
#   primary: "39"
# theme_light:
#   primary: "#0066cc"

defaults:
  user: deploy
  port: 22
  # health_check: false

connections:
  # E-commerce platform
  - id: shop-prod-web1
    host: web1.shop.example.com
    project: shop
    env: prod
    tags: [web, nginx]

  - id: shop-prod-web2
    host: web2.shop.example.com
    project: shop
    env: prod
    tags: [web, nginx]

  - id: shop-prod-api
    host: api.shop.example.com
    project: shop
    env: prod
    tags: [api, go]

  - id: shop-prod-db
    host: db.shop.example.com
    user: dbadmin
    project: shop
    env: prod
    tags: [database, postgres]

  - id: shop-staging
    host: staging.shop.example.com
    project: shop
    env: staging
    tags: [web, api]

  # Internal tools
  - id: tools-gitlab
    host: gitlab.internal.example.com
    user: admin
    project: tools
    env: prod
    tags: [git, ci]

  - id: tools-monitoring
    host: grafana.internal.example.com
    project: tools
    env: prod
    tags: [monitoring]

  - id: tools-logs
    host: elk.internal.example.com
    project: tools
    env: prod
    tags: [logging, elk]

  # Cloud services (reachable - SSH port open)
  - id: cloud-github
    host: github.com
    user: git
    project: cloud
    env: prod
    tags: [git, cloud]

  - id: cloud-gitlab
    host: gitlab.com
    user: git
    project: cloud
    env: prod
    tags: [git, cloud]

  - id: cloud-bitbucket
    host: bitbucket.org
    user: git
    project: cloud
    env: prod
    tags: [git, cloud]

  # Personal servers
  - id: homelab
    host: 192.168.1.100
    user: dan
    tags: [personal]

  - id: vps-nyc
    host: nyc1.myserver.io
    user: root
    port: 2222
    tags: [personal, vps]

groups:
  production: [shop-prod-web1, shop-prod-web2, shop-prod-api, shop-prod-db]
  web-servers: [shop-prod-web1, shop-prod-web2, shop-staging]
  databases: [shop-prod-db]
